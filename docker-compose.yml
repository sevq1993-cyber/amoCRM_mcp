services:
  app:
    build:
      context: .
      target: runtime
    command: ["node", "dist/src/index-http.js"]
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: development
      PORT: 3000
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/amocrm_mcp
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: amocrm_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
