name: "🐞 Сообщение об ошибке"
description: Сообщить о воспроизводимой проблеме в amoCRM MCP server
title: "[Баг]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Спасибо. Опиши проблему максимально конкретно и так, чтобы её можно было воспроизвести.
  - type: input
    id: summary
    attributes:
      label: Краткое описание
      description: Что именно сломано
      placeholder: После успешной авторизации amoCRM callback возвращает 500
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      description: Точные действия, команды или запросы
      placeholder: |
        1. Запустить сервер через npm run dev:http
        2. Открыть amoCRM install flow
        3. Пройти авторизацию
        4. Увидеть ошибку сервера
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      placeholder: Установка должна сохраниться, а callback должен вернуть успешный результат
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      placeholder: Callback возвращает 500, и запись об установке не создаётся
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Окружение
      description: Версия Node.js, режим хранения, важные настройки и контекст запуска
      placeholder: Node 22, локальный memory mode, macOS, HTTP transport
    validations:
      required: false
