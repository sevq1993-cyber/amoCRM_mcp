name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Забрать репозиторий
        uses: actions/checkout@v4

      - name: Настроить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Запустить проверки
        run: npm run check

      - name: Собрать проект
        run: npm run build
